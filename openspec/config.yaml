schema: spec-driven

context: |
    该 i18n 分支必须保持易于持续 rebase 和集成上游 GitLens。
    对于 i18n 工作，应优先最小化对上游维护源码的侵入，并优先采用 `./i18n` 下的本地化所有权机制。
    分支本地的本地化规则、抽取、生成、catalog 与报告能力应由 `./i18n` 下的脚本与资产负责。
    如必须修改上游维护的运行时代码，只允许在目标边界或最终返回值附近放置最小、受控的接入点。

rules:
    proposal:
        - 对于 i18n change，必须说明 `./i18n` 下的脚本或生成产物如何主导本地化流程，以及为什么任何源码改动都已经是最小必要改动。
        - 对于 i18n change，必须明确区分受控展示文案、动态用户数据，以及应保持不变的通用格式内容。
    design:
        - 应优先选择由 `./i18n` 驱动的抽取、生成、catalog、边界注入或运行时转换方案，而不是在上游维护源码中进行大范围逐字符串改写。
        - 如果必须修改上游维护源码，设计必须将改动限制在少数受控触点，并说明为何这些改动已无法继续收缩。
        - 除非现有项目 capability 明确要求，否则不得在 `./i18n` 之外再引入一套并行的分支本地化 ownership 模型。
    spec:
        - i18n spec 必须写明“最小侵入上游源码”原则，以及分支本地化流程由 `./i18n` 负责的 ownership 约束。
    tasks:
        - i18n tasks 应先建立或扩展 `./i18n` 下的脚本、catalog 或生成规则，再在目标调用点实施最小化接入改动。
